services:
  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: nomera-ml
    ports:
      - "8000:8000"
    env_file:
      - ./services/ml/.env
    environment:
      - PYTHONUNBUFFERED=1
      - ML_API_KEY=${ML_API_KEY:-dev-secret-key}
      - ML_BACKEND_URL=http://backend:8001
      - ML_BACKEND_API_KEY=${BACKEND_API_KEY:-dev-backend-key}
      - ML_DEFAULT_SOURCE=/data/example_video.mp4
      - ML_DEFAULT_CAMERA_ROLE=entry
      - ML_AUTO_START=false
    volumes:
      - ./services/ml/example_video.mp4:/data/example_video.mp4:ro
      - ml_model_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - nomera-net
    restart: unless-stopped

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: nomera-backend
    ports:
      - "8001:8001"
    environment:
      - BACKEND_API_KEY=${BACKEND_API_KEY:-dev-backend-key}
      - ML_URL=http://ml:8000
      - ML_API_KEY=${ML_API_KEY:-dev-secret-key}
      - VIDEO_PATH=/data/example_video.mp4
    volumes:
      - ./services/ml/example_video.mp4:/data/example_video.mp4:ro
    depends_on:
      - ml
    networks:
      - nomera-net
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: nomera-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://localhost:8001
      - VITE_BACKEND_WS_URL=ws://localhost:8001
    depends_on:
      - backend
    networks:
      - nomera-net
    restart: unless-stopped

networks:
  nomera-net:
    driver: bridge

volumes:
  ml_model_cache:
